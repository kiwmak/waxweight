<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Sáp Nến</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .login-form {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-input {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            user-select: none;
            font-size: 20px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1>🔐 ĐĂNG NHẬP</h1>
            <p>Quản lý trọng lượng sáp nến</p>
        </div>

        <div class="login-form">
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="remember">
                        <input type="checkbox" id="remember" name="remember">
                        <span>Ghi nhớ đăng nhập</span>
                    </label>
                </div>

                <button type="button" class="login-btn" id="loginBtn" onclick="handleLogin()">
                    <span>ĐĂNG NHẬP</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Hiển thị/ẩn mật khẩu
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        }

        // Hiển thị loading
        function showLoading() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('loginBtn').disabled = true;
        }

        // Ẩn loading
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loginBtn').disabled = false;
        }

        // Hiển thị lỗi
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            // Tự động ẩn sau 5 giây
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Hiển thị thành công
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        // Xử lý đăng nhập
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // Kiểm tra input
            if (!username || !password) {
                showError('Vui lòng nhập đầy đủ thông tin');
                return;
            }

            // Hiển thị loading
            showLoading();
            console.log('📤 Gửi request đăng nhập...');

            try {
                // Gọi API login
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password, 
                        remember: remember 
                    })
                });

                const data = await response.json();
                console.log('📥 Response từ server:', data);

                if (response.ok) {
                    // KIỂM TRA TOKEN CÓ ĐƯỢC TRẢ VỀ KHÔNG
                    if (data.token) {
                        // Lưu token vào localStorage
                        localStorage.setItem('token', data.token);
                        console.log('✅ ĐÃ LƯU TOKEN:', data.token.substring(0, 30) + '...');
                        
                        // Kiểm tra lại token vừa lưu
                        const savedToken = localStorage.getItem('token');
                        console.log('🔍 Kiểm tra lại localStorage:', savedToken ? 'Có token' : 'Không có token');
                        
                        if (savedToken) {
                            showSuccess('Đăng nhập thành công! Đang chuyển hướng...');
                            
                            // Chuyển hướng sau 1 giây
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 1000);
                        } else {
                            showError('Lỗi lưu token, vui lòng thử lại');
                        }
                    } else {
                        showError('Server không trả về token');
                        console.error('❌ Không có token trong response:', data);
                    }
                } else {
                    showError(data.error || 'Đăng nhập thất bại');
                }
            } catch (error) {
                console.error('❌ Lỗi kết nối:', error);
                showError('Không thể kết nối đến server');
            } finally {
                hideLoading();
            }
        }

        // Kiểm tra token khi load trang
        window.onload = function() {
            console.log('🔍 Kiểm tra localStorage khi load login page...');
            const token = localStorage.getItem('token');
            
            if (token) {
                console.log('✅ Đã có token, chuyển về trang chủ');
                window.location.href = '/';
            } else {
                console.log('ℹ️ Chưa có token, hiển thị form đăng nhập');
            }
        };

        // Xử lý phím Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
